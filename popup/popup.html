<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI AutoChat</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="topbar">
        <div class="topbar-main">
          <h1 class="title">AI AutoChat</h1>
          <p class="panel-hint">侧边栏 · 点击页面不会关闭 · 进度会自动保存</p>
        </div>
        <nav class="tabs" role="tablist" aria-label="主标签">
          <button type="button" class="tab active" data-tab="run" id="tabRun" role="tab" aria-selected="true">
            运行
          </button>
          <button type="button" class="tab" data-tab="settings" id="tabSettings" role="tab" aria-selected="false">
            设置
          </button>
        </nav>
      </header>

      <div class="status-row">
        <p id="status" class="status global-status" role="status"></p>
        <button id="stopJob" type="button" class="danger mini stop-btn" hidden>停止</button>
      </div>

      <div id="panelRun" class="tab-panel" role="tabpanel" aria-labelledby="tabRun">
        <textarea
          id="questions"
          rows="9"
          placeholder="每行一个问题"
          spellcheck="false"
        ></textarea>

        <section class="dify-run-panel" aria-label="Dify">
          <label class="run-field run-checkbox">
            <input type="checkbox" id="difyWorkflowEnabled" checked />
            <span>采集完成后自动上传 Dify</span>
          </label>
          <label class="run-field">
            <span class="run-label">target_brands</span>
            <input type="text" id="difyTargetBrands" spellcheck="false" autocomplete="off" />
          </label>
        </section>

        <section class="platform-pick" aria-label="选择平台">
          <p class="platform-pick-hint">勾选平台后连续运行，顺序：Gemini → ChatGPT → Perplexity</p>
          <label class="platform-pick-item gemini">
            <input type="checkbox" id="pickGemini" value="gemini" />
            <span>Gemini</span>
          </label>
          <label class="platform-pick-item chatgpt">
            <input type="checkbox" id="pickChatgpt" value="chatgpt" />
            <span>ChatGPT</span>
          </label>
          <label class="platform-pick-item perplexity">
            <input type="checkbox" id="pickPerplexity" value="perplexity" />
            <span>Perplexity</span>
          </label>
        </section>

        <div class="row">
          <button id="runSelected" type="button" class="primary full">运行已选平台</button>
        </div>

        <section class="dify-retry-panel" aria-label="Dify 补跑">
          <p class="retry-hint">采集成功但 Dify 失败时会自动下载占位 CSV（LLM 列为空），可上传该文件补跑 Dify：</p>
          <div class="row retry-upload-row">
            <input id="stubCsvFile" type="file" accept=".csv,text/csv" hidden />
            <button id="uploadStubCsv" type="button" class="secondary full">上传占位 CSV 补跑 Dify</button>
          </div>
        </section>
      </div>

      <div id="panelSettings" class="tab-panel" role="tabpanel" aria-labelledby="tabSettings" hidden>
        <section class="settings-block" aria-label="API">
          <label class="settings-field">
            <span class="settings-label">API 根地址</span>
            <input type="text" id="difyBaseUrl" placeholder="http://…" spellcheck="false" autocomplete="off" />
          </label>
          <label class="settings-field">
            <span class="settings-label">API Key</span>
            <input type="password" id="difyApiKey" placeholder="" autocomplete="off" spellcheck="false" />
          </label>
          <label class="settings-field">
            <span class="settings-label">API user</span>
            <input type="text" id="difyApiUser" spellcheck="false" autocomplete="off" />
          </label>
        </section>

        <section class="debug" aria-label="调试日志">
          <div class="debug-head">
            <span class="debug-title">日志</span>
            <div class="debug-actions">
              <button id="logRefresh" type="button" class="mini">刷新</button>
              <button id="logClear" type="button" class="mini">清空</button>
              <button id="logExport" type="button" class="mini">导出</button>
            </div>
          </div>
          <textarea id="logView" class="log-view" readonly rows="8" spellcheck="false"></textarea>
        </section>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
