<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI AutoChat</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="wrap">
      <h1 class="title">AI AutoChat</h1>
      <p class="hint">
        每行一个问题，将依次新开对话并发送（需已登录对应站点）。Google AI Overview
        不一定对每个查询都出现，未命中时结果中 answer 为空并带说明。AI Mode 需账号已开通 Labs
        等条件，且 URL 参数可能随地区变化。运行结束后结果保存在扩展内，请在下方的「下载上次运行结果」手动导出。失败时会在「下载」生成
        <strong>ai-autochat-last-error.json</strong>。若出现 Receiving end，可先刷新对应标签页再试。
      </p>
      <textarea
        id="questions"
        rows="10"
        placeholder="例如：&#10;某品牌在你所知的范围内口碑如何？&#10;列出三家竞品并对比。"
        spellcheck="false"
      ></textarea>
      <div class="row">
        <button id="runGemini" type="button" class="primary full">在 Gemini 中运行</button>
      </div>
      <div class="row">
        <button id="runChatgpt" type="button" class="primary chatgpt full">在 ChatGPT 中运行</button>
      </div>
      <div class="row">
        <button id="runPerplexity" type="button" class="primary perplexity full">在 Perplexity 中运行</button>
      </div>
      <div class="row">
        <button id="runGoogleAio" type="button" class="primary google-aio full">在 Google（AI Overview）中运行</button>
      </div>
      <div class="row">
        <button id="runGoogleAimode" type="button" class="primary google-aimode full">在 Google AI Mode 中运行</button>
      </div>
      <p id="status" class="status" role="status"></p>

      <section class="export-block" aria-label="导出上次运行">
        <div class="export-head">导出上次运行</div>
        <div class="export-format">
          <span class="export-label">格式</span>
          <label class="export-opt"
            ><input type="radio" name="exportFormat" value="json" checked /> JSON</label
          >
          <label class="export-opt"
            ><input type="radio" name="exportFormat" value="xlsx" /> Excel（.xlsx）</label
          >
        </div>
        <button id="downloadLastRun" type="button" class="ghost export-btn" disabled>
          下载上次运行结果
        </button>
        <p id="lastRunHint" class="last-run-hint"></p>
      </section>

      <section class="debug" aria-label="调试日志">
        <div class="debug-head">
          <span class="debug-title">调试日志</span>
          <div class="debug-actions">
            <button id="logRefresh" type="button" class="mini">刷新</button>
            <button id="logClear" type="button" class="mini">清空</button>
            <button id="logExport" type="button" class="mini">导出 JSON</button>
          </div>
        </div>
        <textarea id="logView" class="log-view" readonly rows="6" spellcheck="false"></textarea>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
