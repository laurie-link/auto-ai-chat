    - data:
        code: "import csv\nimport json\nfrom io import StringIO\n\ndef _parse_obj(s:\
          \ str) -> dict:\n    s = (s or \"\").strip()\n    a = s.find(\"{\")\n  \
          \  b = s.rfind(\"}\")\n    if a >= 0 and b > a:\n        s = s[a : b + 1]\n\
          \    return json.loads(s)\n\n\ndef main(rows) -> dict:\n    out = StringIO()\n\
          \    w = csv.writer(out)\n    w.writerow(\n        [\n            \"Query\"\
          ,\n            \"Date Checked\",\n            \"Platform\",\n          \
          \  \"Brand Mentioned\",\n            \"No. of Brands Mentioned\",\n            \"Brands Mentioned\",\n    \
          \        \"Share Calculation\",\n            \"Sentiment\",\n          \
          \  \"Notes\",\n            \"Assistant Answer\",\n            \"Citations\"\
          ,\n            \"Page URL\",\n            \"Captured At\",\n        ]\n\
          \    )\n   \
          \ for row in rows or []:\n        try:\n            o = _parse_obj(str(row))\n\
          \        except Exception:\n            continue\n        share = o.get(\"\
          share_calculation\")\n        share_cell = \"\" if share is None else str(share)\n\
          \        brands = o.get(\"brands_mentioned\")\n        if isinstance(brands, list):\n\
          \            brands_cell = \", \".join(str(x).strip() for x in brands if str(x).strip())\n\
          \        else:\n            brands_cell = str(brands or \"\")\n        w.writerow(\n\
          \            [\n                o.get(\"query\", \"\
          \"),\n                o.get(\"date_checked\", \"\"),\n                o.get(\"\
          platform\", \"\"),\n                o.get(\"brand_mentioned\", \"\"),\n\
          \                o.get(\"num_brands_mentioned\", \"\"),\n              \
          \  brands_cell,\n                share_cell,\n                o.get(\"sentiment\"\
          , \"\"),\n          \
          \      o.get(\"notes\", \"\"),\n                o.get(\"assistant_answer\"\
          , \"\"),\n                o.get(\"citations_cell\", \"\"),\n           \
          \     o.get(\"page_url\", \"\"),\n                o.get(\"captured_at_raw\"\
          , \"\"),\n            ]\n        )\n    text = out.getvalue()\n    if text\
          \ and not text.startswith(\"\\ufeff\"):\n        text = \"\\ufeff\" + text\n\
          \    return {\"csv_text\": text}\n"
        code_language: python3
        desc: 将各条 LLM JSON 合并为 CSV 文本
