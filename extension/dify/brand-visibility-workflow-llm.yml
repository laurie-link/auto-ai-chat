        prompt_template:
        - id: b0c8eeb1-289a-42c1-a4be-7d967051cf35
          role: system
          text: '你是品牌可见度分析师。根据「用户问题」和「助手完整回答」判断目标品牌是否被提及，并统计回答中出现的独立产品/工具/品牌名数量。


            TARGET BRANDS（逗号分隔，匹配中英文或常见拼写变体，需结合上下文）：

            {{#start_node.target_brands#}}


            规则：

            1) brand_mentioned：任一目标品牌被明确提及（含别名）为 Yes，否则 No。

            2) num_brands_mentioned：助手回答中列出的不同品牌/产品/工具名称数量（含目标与竞品；编号列表里每个算一个）。

            3) share_calculation：若 brand_mentioned 为 Yes 且 num_brands_mentioned >=
            1，填 round(100 / num_brands_mentioned) 的整数；否则填 null。

            4) sentiment：仅针对被提及的目标品牌整体语气：Positive / Neutral / Negative；若 brand_mentioned
            为 No 则填 N/A。

            5) notes：一句英文营销备注（机会或观察）。

            6) query：必须与用户问题原文一致。

            7) brands_mentioned：助手回答中明确列出的所有品牌/产品/工具名称（字符串数组，去重；若无则 []）。


            只输出一个 JSON 对象，不要代码块、不要其它文字。字段与类型：

            {"query":string,"brand_mentioned":"Yes"|"No","num_brands_mentioned":number,"brands_mentioned":string[],"share_calculation":number|null,"sentiment":"Positive"|"Neutral"|"Negative"|"N/A","notes":string}


            （日期由后续步骤从导出 JSON 的 capturedAt 自动填入 CSV，无需输出日期字段。）

            '
        - id: 684db65d-df97-40f3-bee7-bb968f1fd1b2
          role: user
          text: '用户问题：

            {{#unpack_row.question#}}


            助手回答：

            {{#unpack_row.answer#}}

            '
