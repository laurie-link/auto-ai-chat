    - data:
        code: "import json\nfrom datetime import datetime\n\ndef _iso_to_us_date(iso:\
          \ str) -> str:\n    s = (iso or \"\").strip()\n    if not s:\n        return\
          \ \"\"\n    if s.endswith(\"Z\"):\n        s = s[:-1] + \"+00:00\"\n   \
          \ try:\n        dt = datetime.fromisoformat(s)\n    except ValueError:\n\
          \        try:\n            dt = datetime.strptime(s[:19], \"%Y-%m-%dT%H:%M:%S\"\
          )\n        except ValueError:\n            return \"\"\n    return f\"{dt.month}/{dt.day}/{dt.year}\"\
          \n\n\ndef main(llm_text: str, original_answer: str, captured_at: str, site:\
          \ str, page_url: str, citations_json: str, question: str) -> dict:\n    s\
          \ = (llm_text or \"\").strip()\n    a = s.find(\"{\")\n    b = s.rfind(\"\
          }\")\n    if a >= 0 and b > a:\n        s = s[a : b + 1]\n    try:\n   \
          \     obj = json.loads(s)\n    except Exception:\n        obj = {\n    \
          \        \"query\": \"\",\n            \"brand_mentioned\": \"No\",\n \
          \           \"num_brands_mentioned\": 0,\n            \"share_calculation\"\
          : None,\n            \"sentiment\": \"N/A\",\n            \"notes\": \"\
          llm_json_parse_error\",\n        }\n    if not isinstance(obj.get(\"brands_mentioned\"\
          ), list):\n        obj[\"brands_mentioned\"] = []\n    if not obj.get(\"\
          query\"):\n        obj[\"query\"] = question or \"\"\n    try:\n       \
          \ cites = json.loads(citations_json or \"[]\")\n    except Exception:\n \
          \       cites = []\n    if isinstance(cites, list):\n        citations_cell\
          \ = \"\\n\".join(str(x).strip() for x in cites if str(x).strip())\n   \
          \ else:\n        citations_cell = str(cites or \"\")\n    obj[\"assistant_answer\"\
          ] = original_answer or \"\"\n    obj[\"date_checked\"] = _iso_to_us_date(captured_at)\n\
          \    obj[\"platform\"] = (site or \"\").strip()\n    obj[\"page_url\"] =\
          \ (page_url or \"\").strip()\n    obj[\"captured_at_raw\"] = (captured_at\
          \ or \"\").strip()\n    obj[\"citations_cell\"] = citations_cell\n    return\
          \ {\"combined_json\": json.dumps(obj, ensure_ascii=False)}\n"
        code_language: python3
        desc: 合并 LLM 分析与原始助手全文，供 CSV 增加「Assistant Answer」列
